<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">

<title>DOLOŽENO — ČERNÁ DÍRA (prototyp)</title>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --signal:#f5a623;
    --cyan:#36d6e7;
    --franta:#f2c40f;
    --pepa:#ff6b6b;
    --bg:#050608;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);
    font-family:'IBM Plex Mono',Consolas,monospace;color:#cfd3d8;}
  canvas{display:block;width:100%;height:100%;touch-action:none;cursor:grab}
  canvas:active{cursor:grabbing}

  .brand{position:fixed;top:14px;left:16px;pointer-events:none;user-select:none}
  .brand .logo{color:var(--signal);font-weight:700;font-size:15px;letter-spacing:2px}
  .brand .sub{color:#8b929c;font-size:11px;margin-top:2px;letter-spacing:1px}

  #fps{position:fixed;top:14px;right:16px;font-size:11px;color:#8b929c;user-select:none;text-align:right}

  #hint{position:fixed;bottom:152px;left:50%;transform:translateX(-50%);
    font-size:11px;color:#9aa0a8;background:rgba(5,6,8,.55);padding:6px 12px;
    border:1px solid rgba(245,166,35,.25);border-radius:4px;
    transition:opacity 1.2s;user-select:none;pointer-events:none;white-space:nowrap}

  #panel{position:fixed;bottom:14px;left:16px;right:16px;display:flex;gap:8px 14px;align-items:center;
    background:rgba(5,6,8,.78);border:1px solid rgba(245,166,35,.3);border-radius:6px;
    padding:9px 12px;font-size:11px;flex-wrap:wrap;max-width:840px}
  #panel label{display:flex;gap:5px;align-items:center;cursor:pointer;white-space:nowrap}
  #panel .lbl{color:var(--signal);font-weight:700;letter-spacing:1px}
  #panel .sep{flex-basis:100%;height:0}
  select,input[type=range]{accent-color:var(--signal);background:#101318;color:#cfd3d8;

  input[type=range]{width:74px;padding:0;border:none;background:transparent}
  input[type=checkbox]{accent-color:var(--signal)}
  button{font-family:inherit;font-size:11px;font-weight:700;letter-spacing:1px;cursor:pointer;
    background:var(--signal);color:#0a0c10;border:none;border-radius:4px;padding:6px 12px}
  button.ghost{background:transparent;color:#9aa0a8;border:1px solid #2a2f36}
  button:active{transform:translateY(1px)}

  /* komentáře Franty a Pepana — dole nad tlačítky, vždy jen jeden */
  #chips{position:fixed;left:50%;transform:translateX(-50%);bottom:150px;
    display:flex;flex-direction:column;align-items:center;pointer-events:none;
    max-width:min(560px,92vw);z-index:6}
  .chip{font-size:11.5px;line-height:1.45;padding:8px 11px;border-radius:6px;
    background:rgba(5,6,8,.88);opacity:0;transform:translateY(10px);
    transition:opacity .4s, transform .4s;
    display:flex;align-items:flex-start;gap:9px}
  .chip.show{opacity:1;transform:none}
  .chip.f{border:1px solid var(--franta);color:var(--franta)}
  .chip.p{border:1px solid var(--pepa);color:var(--pepa)}
  .chip b{letter-spacing:1px}
  .chip svg.av{width:36px;height:36px;flex:0 0 36px;border-radius:50%}

  /* náhled velikosti před vhozením (vlevo dole ve scéně) */
  #sunPreview{position:fixed;left:16px;bottom:170px;display:flex;flex-direction:column;
    align-items:center;gap:7px;font-size:10px;color:#9aa0a8;letter-spacing:1px;
    text-align:center;user-select:none}
  #sunPreview svg{pointer-events:none;display:block}
  #sunPreview .prevLabel{color:var(--signal);font-weight:700}
  #sunPreview input[type=range]{-webkit-appearance:none;appearance:none;width:140px;height:4px;
    border-radius:2px;background:#2a2f36;outline:none;cursor:pointer}
  #sunPreview input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;
    width:15px;height:15px;border-radius:50%;background:var(--signal);

  #sunPreview input[type=range]::-moz-range-thumb{width:13px;height:13px;border-radius:50%;
    background:var(--signal);border:2px solid #0a0c10;box-shadow:0 0 6px rgba(245,166,35,.6)}

  /* akční tlačítka uprostřed nad panelem (výška se dopočítá podle panelu) */

  /* horní lišta presetů: miniatura + jméno, VŽDY v jedné řadě */

  @media (max-width: 700px){

    button.preset span{font-size:8px;letter-spacing:0.5px}
  }

    background:var(--bg);color:#ff6b6b;font-size:13px;padding:30px;text-align:center;z-index:10}

<body>
<canvas id="c"></canvas>

<div class="brand">

<script src="babis-data.js"></script>
<script>
'use strict';
/* ============================================================
   DOLOŽENO: ČERNÁ DÍRA — prototyp
   Jednotky: r_s = 1, G = c = 1, M = 1/2.

   SVĚTLO (pozadí + disk): přesné fotonové geodetiky ve
   Schwarzschildově metrice (Binetova rovnice v kart. tvaru).
   TĚLESA: až 3 najednou, každé max 8000 částic (koule Slunce
   nebo deska z pixelů obrázku). Gravitace: Paczyński–Wiitův
   potenciál, adaptivní krok u horizontu (nejde přeskočit).
   Po slapovém roztržení letí trosky balisticky; disipace
   (srážky proudů) nabíhá postupně -> barevný akreční disk ->
   spirála za horizont.
   ============================================================ */

/* ---------------- shadery: lensing pozadí + disk ---------------- */
const VS_QUAD = `#version 300 es
layout(location=0) in vec2 aPos;
void main(){ gl_Position = vec4(aPos, 0.0, 1.0); }`;

const FS_QUAD = `#version 300 es
precision highp float;
out vec4 fragColor;

uniform vec2  uRes;
uniform float uTime;
uniform vec3  uCamPos;
uniform mat3  uCamBasis;
uniform float uTanHalfFov;
uniform int   uSteps;
uniform float uDiskGain;
uniform float uDiskOn;

const float R_HOR  = 1.0;
const float R_IN   = 3.0;
const float R_OUT  = 13.0;
const float R_FAR  = 55.0;

float hash12(vec2 p){
  vec3 p3 = fract(vec3(p.xyx) * 0.1031);
  p3 += dot(p3, p3.yzx + 33.33);
  return fract((p3.x + p3.y) * p3.z);
}
vec3 hash33(vec3 p){
  p = fract(p * vec3(0.1031, 0.1030, 0.0973));
  p += dot(p, p.yxz + 33.33);
  return fract((p.xxy + p.yxx) * p.zyx);
}
float vnoise(vec2 p){
  vec2 i = floor(p), f = fract(p);
  f = f * f * (3.0 - 2.0 * f);
  return mix(mix(hash12(i),             hash12(i + vec2(1,0)), f.x),
             mix(hash12(i + vec2(0,1)), hash12(i + vec2(1,1)), f.x), f.y);
}
float fbm(vec2 p){
  float a = 0.5, s = 0.0;
  for(int i = 0; i < 4; i++){ s += a * vnoise(p); p = p * 2.13 + 17.7; a *= 0.5; }
  return s;
}

vec3 starLayer(vec3 d, float scale, float thresh, float bright){
  vec3 g  = d * scale;
  vec3 id = floor(g);
  vec3 f  = fract(g);
  vec3 h  = hash33(id);
  vec3 sp = 0.2 + 0.6 * hash33(id + 71.3);
  float m = smoothstep(thresh, 1.0, h.x);
  float s = m * smoothstep(0.20, 0.0, length(f - sp));
  vec3 tint = mix(vec3(0.75, 0.85, 1.0), vec3(1.0, 0.9, 0.75), h.y);
  return s * s * bright * tint;
}
vec3 background(vec3 d){
  vec3 col = vec3(0.0);
  col += starLayer(d,  55.0, 0.78, 1.4);
  col += starLayer(d, 120.0, 0.72, 0.5);
  vec3 bn = normalize(vec3(0.25, 1.0, 0.12));
  float band = exp(-18.0 * pow(dot(d, bn), 2.0));
  float neb  = fbm(d.xy * 3.1 + 4.0) * fbm(d.zx * 2.7 + 9.0);
  col += band * (vec3(0.035, 0.045, 0.075) + vec3(0.08, 0.065, 0.05) * neb);
  return col;
}

vec3 bbcol(float t){
  vec3 c = mix(vec3(0.85, 0.12, 0.02), vec3(1.0, 0.45, 0.10), smoothstep(0.0, 0.4, t));
  c = mix(c, vec3(1.0, 0.85, 0.55), smoothstep(0.4, 0.9, t));
  c = mix(c, vec3(0.92, 0.94, 1.06), smoothstep(0.9, 1.5, t));
  return c;
}
vec3 diskShade(vec3 hit, vec3 rayDir){
  float r = length(hit);
  float beta = clamp(sqrt(0.5 / max(r - 1.0, 0.35)), 0.0, 0.97);
  vec3 tangent = normalize(vec3(-hit.z, 0.0, hit.x));
  float cosT = dot(tangent, -rayDir);
  float dopp = sqrt(1.0 - beta * beta) / (1.0 - beta * cosT);
  float grav = sqrt(max(1.0 - 1.0 / r, 0.0));
  float shift = dopp * grav;

  float temp = pow(R_IN / r, 0.75);

  float om = 0.7071 / pow(r, 1.5);
  float ct = cos(om * uTime * 2.2), st = sin(om * uTime * 2.2);
  vec2 q = mat2(ct, -st, st, ct) * hit.xz;
  float streak = fbm(vec2(r * 6.5, 2.2 * fbm(q * 0.7)));
  float n = 0.35 + 0.85 * streak + 0.40 * fbm(q * 1.4);

  float edge = smoothstep(R_IN, R_IN + 0.35, r) * smoothstep(R_OUT, R_OUT - 4.5, r);
  float inten = uDiskGain * 1.5 * pow(temp, 2.2) * n * edge * pow(shift, 4.0);
  return bbcol(temp * shift * 1.1) * inten;
}

void main(){
  vec2 uv = (gl_FragCoord.xy * 2.0 - uRes) / uRes.y;
  vec3 rd = normalize(uCamBasis * vec3(uv * uTanHalfFov, 1.0));
  vec3 p  = uCamPos;
  vec3 v  = rd;

  vec3 hv = cross(p, v);
  float h2 = dot(hv, hv);

  vec3 col = vec3(0.0);
  float transmit = 1.0;
  bool captured = false;

  // dynamická mez smyčky (uniform) — ANGLE/D3D ji nerozbaluje při kompilaci
  for(int i = 0; i < uSteps; i++){
    float r = length(p);
    if(r < R_HOR * 1.02){ captured = true; break; }
    if(r > R_FAR && dot(p, v) > 0.0) break;

    float dt = 0.075 * max(0.28, r - 0.8);

    float r5 = r * r; r5 = r5 * r5 * r;
    vec3 a1 = -1.5 * h2 * p / r5;
    vec3 pn = p + v * dt + 0.5 * a1 * dt * dt;
    float rn = length(pn);
    float rn5 = rn * rn; rn5 = rn5 * rn5 * rn;
    vec3 a2 = -1.5 * h2 * pn / rn5;
    vec3 vn = v + 0.5 * (a1 + a2) * dt;

    if(uDiskOn > 0.5 && p.y * pn.y < 0.0){
      float t = p.y / (p.y - pn.y);
      vec3 hit = mix(p, pn, t);
      float hr = length(hit);
      if(hr > R_IN && hr < R_OUT){
        col += transmit * diskShade(hit, normalize(mix(v, vn, t)));
        transmit *= 0.32;
      }
    }
    p = pn; v = vn;
  }

  if(!captured) col += transmit * background(normalize(v));

  col = clamp((col * (2.51 * col + 0.03)) / (col * (2.43 * col + 0.59) + 0.14), 0.0, 1.0);
  col = pow(col, vec3(1.0 / 2.2));
  col *= 1.0 - 0.25 * dot(uv * 0.55, uv * 0.55);

  fragColor = vec4(col, 1.0);
}`;

/* ---------------- shadery: částice těles ---------------- */
const VS_PTS = `#version 300 es
layout(location=0) in vec3 aPos;
layout(location=1) in float aHeat;    // -1 = mrtvá (pohlcená) částice
layout(location=2) in vec3 aColor;    // barva částice
layout(location=3) in vec2 aSizeGlow; // x = velikost spritu, y = 1 žhavý glow / 0 pixel fotky
uniform vec3  uCamPos;
uniform mat3  uCamBasis;
uniform float uTanHalfFov;
uniform vec2  uRes;
out float vHeat;
out float vKill;
out vec3  vColor;
out float vGlow;

void main(){
  vHeat = aHeat;
  vColor = aColor;
  vGlow = aSizeGlow.y;
  vKill = 0.0;
  if(aHeat < -0.5){
    vKill = 1.0; gl_Position = vec4(0.0, 0.0, -3.0, 1.0); gl_PointSize = 1.0; return;
  }

  vec3 rel = aPos - uCamPos;
  float DS = length(rel);
  vec3 vdir = rel / DS;

  // GRAVITAČNÍ OHYB SVĚTLA ČÁSTICE (Schwarzschildova bodová čočka):
  // theta = (beta + sqrt(beta² + 4·thetaE²)) / 2, thetaE² = 2·rs·D_LS/(D_L·D_S)
  float DL = length(uCamPos);
  vec3 lhat = -uCamPos / DL;
  float cosb = clamp(dot(vdir, lhat), -1.0, 1.0);
  float beta = acos(cosb);
  float DLS = dot(rel, lhat) - DL;
  float mag = 1.0;
  bool behind = DLS > 0.0;
  if(behind){
    float thetaE2 = 2.0 * DLS / (DL * DS);
    float b = max(beta, 0.002);
    float theta = 0.5 * (b + sqrt(b * b + 4.0 * thetaE2));
    vec3 perp = vdir - lhat * cosb;
    float pl = length(perp);
    if(pl > 1e-5){
      perp /= pl;
      vdir = lhat * cos(theta) + perp * sin(theta);
      mag = clamp(sqrt(theta / b), 1.0, 2.2);
    }
  }

  // stín: obrazy uvnitř úhlu stínu (fotony s b < ~2,6 r_s) díra polkne
  if(behind){
    float shAng = asin(clamp(2.599 / DL, 0.0, 1.0));
    if(acos(clamp(dot(vdir, lhat), -1.0, 1.0)) < shAng * 0.98) vKill = 1.0;
  }

  vec3 c = (vdir * DS) * uCamBasis;
  if(c.z < 0.05){
    vKill = 1.0; gl_Position = vec4(0.0, 0.0, -3.0, 1.0); gl_PointSize = 1.0; return;
  }
  vec2 ndc = vec2(c.x / (uTanHalfFov * c.z) * (uRes.y / uRes.x),
                  c.y / (uTanHalfFov * c.z));
  gl_Position = vec4(ndc * c.z, 0.0, c.z);

  float px = uRes.y * aSizeGlow.x * (0.85 + 0.35 * aHeat) * mag
             / (uTanHalfFov * c.z);
  gl_PointSize = clamp(px, 2.0, 48.0);
}`;

const FS_PTS = `#version 300 es
precision mediump float;
in float vHeat;
in float vKill;
in vec3  vColor;
in float vGlow;
out vec4 fragColor;
void main(){
  if(vKill > 0.5) discard;
  float d = length(gl_PointCoord - 0.5) * 2.0;   // 0 střed .. 1 okraj spritu
  float h = clamp(vHeat, 0.0, 1.0);

  // vGlow = 1: žhavá hvězdná hmota (měkká záře)
  // vGlow = 0: pixel fotky — plné jádro, věrná barva, jen jemné okraje
  float aGlow = exp(-d * d * 5.0) + 0.45 * exp(-d * d * 1.8);
  float aFlat = smoothstep(1.0, 0.45, d);
  float a = mix(aFlat, aGlow, vGlow);
  a *= smoothstep(1.0, 0.8, d);

  // barva tělesa; teprve blízko díry se hmota rozžhaví doběla
  float glowT = clamp((h - 0.72) * 3.2, 0.0, 1.0);
  vec3 col = mix(vColor, vec3(1.0, 0.85, 0.55), mix(glowT, clamp((h - 0.55) * 1.8, 0.0, 1.0), vGlow));
  col += vec3(1.0, 0.9, 0.7) * max(h - 0.85, 0.0) * 2.0;
  float bright = mix(1.0, 0.35 + 0.75 * h, vGlow);
  fragColor = vec4(col * a * bright, a);
}`;

/* ============================================================ GL setup */
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2', { antialias: false, alpha: false });
const errBox = document.getElementById('err');

function fail(msg){
  errBox.style.display = 'flex';
  errBox.textContent = msg;
  throw new Error(msg);
}
if(!gl) fail('Tvůj prohlížeč nepodporuje WebGL2. Zkus aktuální Chrome/Firefox/Edge/Safari.');

function makeProg(vs, fs){
  function compile(type, src){
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if(!gl.getShaderParameter(s, gl.COMPILE_STATUS))
      fail('Chyba shaderu:\n' + gl.getShaderInfoLog(s));
    return s;
  }
  const p = gl.createProgram();
  gl.attachShader(p, compile(gl.VERTEX_SHADER, vs));
  gl.attachShader(p, compile(gl.FRAGMENT_SHADER, fs));
  gl.linkProgram(p);
  if(!gl.getProgramParameter(p, gl.LINK_STATUS))
    fail('Chyba linkování: ' + gl.getProgramInfoLog(p));
  return p;
}
const progQuad = makeProg(VS_QUAD, FS_QUAD);
const progPts  = makeProg(VS_PTS,  FS_PTS);

function uniforms(prog, names){
  const o = {};
  for(const n of names) o[n] = gl.getUniformLocation(prog, n);
  return o;
}
const UQ = uniforms(progQuad, ['uRes','uTime','uCamPos','uCamBasis','uTanHalfFov','uSteps','uDiskGain','uDiskOn']);
const UP = uniforms(progPts,  ['uRes','uCamPos','uCamBasis','uTanHalfFov']);

// fullscreen triangle
const vaoQuad = gl.createVertexArray();
gl.bindVertexArray(vaoQuad);
const bufQuad = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, bufQuad);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
gl.enableVertexAttribArray(0);
gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);

/* ---------------- částice: až 3 tělesa po 8000 částicích ---------------- */
const SLOTS = 3;
const SLOT_N = 8000;
const N = SLOTS * SLOT_N;
const pos    = new Float32Array(N * 3);
const vel    = new Float32Array(N * 3);
const rest   = new Float32Array(N * 3);   // klidový tvar tělesa
const colArr = new Float32Array(N * 3);   // barva částic
const sizeGlow = new Float32Array(N * 2); // x = velikost spritu, y = 1 žhavá hmota / 0 pixel fotky
const heat   = new Float32Array(N);       // -1 = pohlcená / neobsazená
heat.fill(-1);

const G_M = 0.5;
const R_CAPTURE = 1.25;

// vnitřní soudržnost tělesa (drží tvar proti slapům, dokud nepovolí):
const K_SPRING = 0.15;
const K_DAMP   = 0.4;
// disipace po roztržení (viskozita/srážky proudů):
const K_CIRC   = 0.03;
const K_DRAG   = 0.007;  // disk žije ~30-40 s
const K_KICK   = 0.05;
const K_TURB   = 0.03;

let simT = 0;

// stav jednotlivých těles (slotů)
function newSlot(base){
  return { base, active: false, count: 0, captured: 0,
           disrupted: false, wasInfalling: false, disruptT: -1,
           holding: false, rocheSaid: false, endSaid: false,
           com: [0,0,0], comv: [0,0,0], Rp: 3, mp: 0.375, lines: null };
}
const OBJS = [newSlot(0), newSlot(SLOT_N), newSlot(2 * SLOT_N)];

/* ---------- stavitelé těles ---------- */
// každý vrací {pts: [{a,b,c, r,g,b2, h0}], scale}
function makeBallPayload(Rp){
  const pts = [];
  for(let i = 0; i < SLOT_N; i++){
    let x, y, z, d2;
    do {
      x = Math.random() * 2 - 1; y = Math.random() * 2 - 1; z = Math.random() * 2 - 1;
      d2 = x*x + y*y + z*z;
    } while(d2 > 1);
    const h0 = 0.45 + 0.25 * Math.random();
    const t = (h0 - 0.45) / 0.25;
    pts.push({ a: x * Rp, b: y * Rp, c: z * Rp,
               r: 1.0, g: 0.38 + 0.44 * t, b2: 0.06 + 0.39 * t, h0: h0 });
  }
  return { pts, scale: 0.13, glow: 1 };   // hvězda: měkká záře
}

// z obrázku: každý pixel (mimo pozadí) = jedna barevná částice
function imageToPayload(img, Rp){
  const ar = Math.max(0.2, Math.min(5, img.width / Math.max(1, img.height)));
  let rows = Math.max(8, Math.floor(Math.sqrt(SLOT_N / ar)));
  let cols = Math.max(8, Math.floor(rows * ar));
  while(cols * rows > SLOT_N && rows > 8){ rows--; cols = Math.max(8, Math.floor(rows * ar)); }
  const cv = document.createElement('canvas');
  cv.width = cols; cv.height = rows;
  const c2 = cv.getContext('2d', { willReadFrequently: true });
  c2.drawImage(img, 0, 0, cols, rows);
  const dat = c2.getImageData(0, 0, cols, rows).data;
  // barva pozadí = průměr rohů; podobné pixely vynecháme (chroma-key)
  const corner = (ix, iy) => { const o = (iy * cols + ix) * 4; return [dat[o], dat[o+1], dat[o+2]]; };
  const cs = [corner(0,0), corner(cols-1,0), corner(0,rows-1), corner(cols-1,rows-1)];
  const bg = [0,1,2].map(k => (cs[0][k] + cs[1][k] + cs[2][k] + cs[3][k]) / 4);
  const ph = 2 * Rp, pw = ph * ar;
  const pts = [];
  for(let iy = 0; iy < rows; iy++) for(let ix = 0; ix < cols; ix++){
    const o = (iy * cols + ix) * 4;
    if(dat[o+3] < 40) continue;
    const dr = dat[o]-bg[0], dg = dat[o+1]-bg[1], db = dat[o+2]-bg[2];
    if(Math.sqrt(dr*dr + dg*dg + db*db) < 55) continue;
    pts.push({
      a: ((ix + 0.5) / cols - 0.5) * pw,
      b: (0.5 - (iy + 0.5) / rows) * ph,
      c: (Math.random() - 0.5) * 0.12,
      r: dat[o] / 255, g: dat[o+1] / 255, b2: dat[o+2] / 255,
      h0: 0.12,                       // studená hmota: drží barvu fotky
    });
  }
  if(pts.length < 50) throw new Error('v obrázku skoro nic nezbylo');
  // pixely fotky: plné jádro, bez záře — dokud je nerozžhaví díra
  return { pts, scale: Math.max(pw / cols, ph / rows) * 1.15, glow: 0 };
}

/* ---------- hod tělesa (WYSIWYG z kruhu náhledu, doprava kolem díry) ---------- */
function throwObject(builder, key, fallbackAcc){
  const slot = OBJS.find(o => !o.active);
  if(!slot){
    say('f', 'Tři tělesa najednou stačí. Počkej, až něco spadne — nebo dej RESET.');
    return false;
  }
  const lines = LINES[key] || Object.assign({}, LINES.obrazek);
  const Rp = parseFloat($('psize').value);
  const mp = 0.003 * Math.pow(Rp / 0.6, 3);   // konstantní hustota
  const rperi = Math.max(parseFloat($('peri').value), 1.6);

  // START PŘESNĚ V KRUHU NÁHLEDU (stejná pozice i velikost na obrazovce)
  const rect = sunSvg.getBoundingClientRect();
  const sx = rect.left + rect.width / 2;
  const sy = rect.top + rect.height / 2;
  const cw = canvas.clientWidth, ch = canvas.clientHeight;
  const tanHF = Math.tan(0.5 * 60 * Math.PI / 180);
  const ux = (2 * sx - cw) / ch * tanHF;
  const uy = (ch - 2 * sy) / ch * tanHF;
  const cpw = Math.cos(cam.pitch), spw = Math.sin(cam.pitch);
  const cyw = Math.cos(cam.yaw),   syw = Math.sin(cam.yaw);
  const offC = [cam.dist * cpw * syw, cam.dist * spw, cam.dist * cpw * cyw];
  const camP = [cam.target[0] + offC[0], cam.target[1] + offC[1], cam.target[2] + offC[2]];
  const fwdC = norm3([-offC[0], -offC[1], -offC[2]]);
  const rightC = norm3(cross3(fwdC, [0, 1, 0]));
  const upC = cross3(rightC, fwdC);
  const dir = norm3([
    rightC[0] * ux + upC[0] * uy + fwdC[0],
    rightC[1] * ux + upC[1] * uy + fwdC[1],
    rightC[2] * ux + upC[2] * uy + fwdC[2],
  ]);
  const rpx = parseFloat(sunCircle.getAttribute('r')) || 60;
  const dSpawn = Rp * (ch * 0.5) / (tanHF * rpx);
  let S = [camP[0] + dir[0] * dSpawn, camP[1] + dir[1] * dSpawn, camP[2] + dir[2] * dSpawn];
  let R0 = Math.hypot(S[0], S[1], S[2]);
  const minR = Math.max(10, rperi + 5);
  if(R0 < minR){ const s = minR / R0; S = [S[0]*s, S[1]*s, S[2]*s]; R0 = minR; }
  if(R0 > 34){  const s = 34 / R0;   S = [S[0]*s, S[1]*s, S[2]*s]; R0 = 34; }
  const cx = S[0], cy0 = S[1], cz = S[2];

  // hod doprava kolem díry (bez radiální složky -> oblet, ne zásah)
  const Sh = [S[0] / R0, S[1] / R0, S[2] / R0];
  const dotRS = rightC[0]*Sh[0] + rightC[1]*Sh[1] + rightC[2]*Sh[2];
  let t3 = [rightC[0] - Sh[0]*dotRS, rightC[1] - Sh[1]*dotRS, rightC[2] - Sh[2]*dotRS];
  if(Math.hypot(t3[0], t3[1], t3[2]) < 0.1) t3 = cross3([0, 1, 0], S);
  t3 = norm3(t3);

  // rychlost tak, aby zadané přiblížení byl SKUTEČNÝ pericentr (PW potenciál)
  const v0 = Math.sqrt(2 * G_M * (1/(R0 - 1) - 1/(rperi - 1)) /
                       (1 - (R0 * R0) / (rperi * rperi)));

  let payload;
  try { payload = builder(Rp); }
  catch(e){ say('f', 'Obrázek nejde použít: ' + e.message); return false; }
  const pts = payload.pts;
  const M = Math.min(pts.length, SLOT_N);

  // vycentrovat offsety — pružiny nesmí mít čistou výslednici (raketový efekt)
  let mxo = 0, myo = 0, mzo = 0;
  for(let i = 0; i < M; i++){ mxo += pts[i].a; myo += pts[i].b; mzo += pts[i].c; }
  mxo /= M; myo /= M; mzo /= M;

  const B = slot.base;
  for(let i = 0; i < SLOT_N; i++) heat[B + i] = -1;
  for(let i = 0; i < M; i++){
    const p = pts[i];
    const la = p.a - mxo, lb = p.b - myo, lc = p.c - mzo;
    const ox = rightC[0]*la + upC[0]*lb + fwdC[0]*lc;
    const oy = rightC[1]*la + upC[1]*lb + fwdC[1]*lc;
    const oz = rightC[2]*la + upC[2]*lb + fwdC[2]*lc;
    const j = (B + i) * 3;
    pos[j] = cx + ox; pos[j+1] = cy0 + oy; pos[j+2] = cz + oz;
    rest[j] = ox; rest[j+1] = oy; rest[j+2] = oz;
    vel[j] = v0 * t3[0]; vel[j+1] = v0 * t3[1]; vel[j+2] = v0 * t3[2];
    heat[B + i] = p.h0;
    colArr[j] = p.r; colArr[j+1] = p.g; colArr[j+2] = p.b2;
    sizeGlow[(B + i) * 2] = payload.scale;
    sizeGlow[(B + i) * 2 + 1] = payload.glow;
  }
  gl.bindBuffer(gl.ARRAY_BUFFER, bufCol);
  gl.bufferSubData(gl.ARRAY_BUFFER, 0, colArr);
  gl.bindBuffer(gl.ARRAY_BUFFER, bufSize);
  gl.bufferSubData(gl.ARRAY_BUFFER, 0, sizeGlow);

  slot.active = true;
  slot.count = M;
  slot.captured = 0;
  slot.disrupted = false;
  slot.wasInfalling = false;
  slot.disruptT = -1;
  slot.rocheSaid = false;
  slot.endSaid = false;
  slot.com = [cx, cy0, cz];
  slot.comv = [v0 * t3[0], v0 * t3[1], v0 * t3[2]];
  slot.Rp = Rp;
  slot.mp = mp;
  slot.lines = lines;
  say('p', lines.hod);
  $('hint').style.opacity = '0';
  return true;
}

/* ---------- spouštěče ---------- */
function launchSun(){
  throwObject(Rp => makeBallPayload(Rp), 'slunce');
}
function launchPreset(p){
  const im = new Image();
  im.onload = () => throwObject(Rp => imageToPayload(im, Rp), p.id);
  im.onerror = () => say('f', 'Obrázek jsem nenašel — nahraj vlastní, nebo otevři apku přes web.');
  im.src = p.src;
}
function launchImageFile(file){
  const rd = new FileReader();
  rd.onload = () => {
    const im = new Image();
    im.onload = () => throwObject(Rp => imageToPayload(im, Rp), 'obrazek');
    im.src = rd.result;
  };
  rd.readAsDataURL(file);
}

function resetSun(){
  for(const o of OBJS){
    o.active = false; o.count = 0; o.captured = 0;
    o.disrupted = false; o.endSaid = true;
  }
  heat.fill(-1);
  gl.bindBuffer(gl.ARRAY_BUFFER, bufHeat);
  gl.bufferSubData(gl.ARRAY_BUFFER, 0, heat);
}

/* fyzika částic — jeden krok dt (adaptivní dělení u horizontu) */
function physStep(dt){
  simT += dt;

  // fáze 1: těžiště + detekce roztržení, zvlášť pro každé těleso
  for(const o of OBJS){
    o.holding = false;
    if(!o.active || o.disrupted) continue;
    let sx=0, sy=0, sz=0, svx=0, svy=0, svz=0, nb=0;
    const bindR2 = (2.5 * o.Rp) * (2.5 * o.Rp);
    for(let i = o.base; i < o.base + o.count; i++){
      if(heat[i] < -0.5) continue;
      const dx = pos[i*3]-o.com[0], dy = pos[i*3+1]-o.com[1], dz = pos[i*3+2]-o.com[2];
      if(dx*dx + dy*dy + dz*dz < bindR2){
        sx += pos[i*3]; sy += pos[i*3+1]; sz += pos[i*3+2];
        svx += vel[i*3]; svy += vel[i*3+1]; svz += vel[i*3+2];
        nb++;
      }
    }
    if(nb > 30){
      o.com  = [sx/nb, sy/nb, sz/nb];
      o.comv = [svx/nb, svy/nb, svz/nb];
      o.holding = true;
    }
    // roztržení: Rocheova mez, nebo průchod pericentrem (po prokazatelném pádu)
    const d = Math.hypot(o.com[0], o.com[1], o.com[2]);
    const rocheR = o.Rp * Math.cbrt(2 * G_M / o.mp);
    const radial = (o.com[0]*o.comv[0] + o.com[1]*o.comv[1] + o.com[2]*o.comv[2]) / Math.max(d, 1e-6);
    if(d < rocheR || (o.wasInfalling && radial > 0 && d < 16)){
      o.disrupted = true;
      o.holding = false;
      o.disruptT = simT;
      for(let i = o.base; i < o.base + o.count; i++){
        if(heat[i] < -0.5) continue;
        vel[i*3]   += (Math.random() - 0.5) * K_KICK;
        vel[i*3+1] += (Math.random() - 0.5) * K_KICK * 0.6;
        vel[i*3+2] += (Math.random() - 0.5) * K_KICK;
      }
      if(!o.rocheSaid){ o.rocheSaid = true; say('f', o.lines.trh); }
    }
    if(radial < -0.02) o.wasInfalling = true;
  }

  // fáze 2: parametry disipace pro každé těleso
  for(const o of OBJS){
    if(!o.active){ o._drag = 1; o._circ = 0; o._turb = 0; o._ramp = 0; continue; }
    const ramp = (o.disrupted && o.disruptT >= 0)
      ? Math.min(1, Math.max(0, (simT - o.disruptT - 40) / 80)) : 0;
    const escal = (o.disrupted && o.disruptT >= 0)
      ? Math.min(8, 1 + Math.max(0, (simT - o.disruptT - 150) / 100)) : 1;
    const finishing = o.disrupted && (o.count - o.captured) < o.count * 0.08;
    o._ramp = ramp;
    o._circ = 1 - Math.exp(-K_CIRC * ramp * dt);
    o._drag = Math.exp(-K_DRAG * (finishing ? 12 : ramp * escal) * dt);
    o._turb = finishing ? 0 : K_TURB * ramp;
  }

  // fáze 3: pohyb částic
  for(const o of OBJS){
    if(!o.active) continue;
    const circBlend = o._circ, dragFac = o._drag, turbAmp = o._turb, ramp = o._ramp;
    for(let ii = o.base; ii < o.base + o.count; ii++){
      if(heat[ii] < -0.5) continue;
      const ix = ii*3;
      let x = pos[ix], y = pos[ix+1], z = pos[ix+2];
      let vx = vel[ix], vy = vel[ix+1], vz = vel[ix+2];

      // gravitace: adaptivní krok, u horizontu jemný (nejde ho přeskočit)
      let rem = dt, guard = 0, dead = false;
      while(rem > 1e-6 && guard++ < 40){
        const r = Math.sqrt(x*x + y*y + z*z);
        if(r < R_CAPTURE){ dead = true; break; }
        const vmag = Math.sqrt(vx*vx + vy*vy + vz*vz) + 1e-6;
        let h = Math.min(rem, 0.15 * (r - 1.0) / vmag, 0.05);
        if(h < 1e-5) h = 1e-5;
        // Paczyński–Wiita: a = -GM/(r - r_s)²; u horizontu roste nade všechny meze
        const rm = Math.max(r - 1.0, 0.02);
        const f = -G_M / (rm * rm * r);
        let ax = f * x, ay = f * y, az = f * z;
        // soudržnost: pružný návrat ke klidovému tvaru + tlumení kmitů
        if(o.holding){
          const sxo = (x - o.com[0]) - rest[ix];
          const syo = (y - o.com[1]) - rest[ix+1];
          const szo = (z - o.com[2]) - rest[ix+2];
          ax -= K_SPRING * sxo; ay -= K_SPRING * syo; az -= K_SPRING * szo;
          const dmp = K_DAMP * h;
          vx += (o.comv[0] - vx) * dmp;
          vy += (o.comv[1] - vy) * dmp;
          vz += (o.comv[2] - vz) * dmp;
        }
        vx += ax * h; vy += ay * h; vz += az * h;
        x += vx * h; y += vy * h; z += vz * h;
        rem -= h;
      }
      if(!dead && Math.sqrt(x*x + y*y + z*z) < R_CAPTURE) dead = true;
      if(dead){
        heat[ii] = -1; o.captured++;
        continue;
      }

      // po roztržení: balistika -> disipace -> disk -> spirála
      if(o.disrupted){
        const r = Math.sqrt(x*x + y*y + z*z);
        if(r > 24){
          // návrat slapového proudu: daleko se trosky stáčejí do volného pádu
          const vin = Math.sqrt(2 * G_M / (r - 1.0));
          const bl = 1 - Math.exp(-0.05 * ramp * dt);
          vx += (-x / r * vin - vx) * bl;
          vy += (-y / r * vin - vy) * bl;
          vz += (-z / r * vin - vz) * bl;
        } else {
          // kruhové usazování jen NAD ISCO a v zóně disku
          if(r > 3.2 && r < 18){
            const vc = Math.sqrt(G_M * r) / (r - 1.0);
            const invXZ = 1 / Math.max(Math.hypot(x, z), 1e-6);
            const txd = -z * invXZ, tzd = x * invXZ;
            vx += (txd * vc - vx) * circBlend;
            vy += (0        - vy) * circBlend * 0.10;
            vz += (tzd * vc - vz) * circBlend;
          }
          vx *= dragFac; vy *= dragFac; vz *= dragFac;
          if(r < 18){
            const tb = turbAmp * dt;
            vx += (Math.random() - 0.5) * tb;
            vy += (Math.random() - 0.5) * tb * 0.7;
            vz += (Math.random() - 0.5) * tb;
          }
        }
      }

      pos[ix] = x; pos[ix+1] = y; pos[ix+2] = z;
      vel[ix] = vx; vel[ix+1] = vy; vel[ix+2] = vz;

      // žhnutí: slapové hnětení a tření blíž k díře přitápí
      const rr = Math.sqrt(x*x + y*y + z*z);
      const hh = Math.max(0, Math.min(1, (8.0 - rr) / 6.0));
      const target = 0.45 + 0.55 * hh;
      if(target > heat[ii]) heat[ii] = target;
    }
  }
}

/* události -> závěrečné komentáře (Franta, pak Pepan) */
function checkEvents(){
  for(const o of OBJS){
    if(o.active && !o.endSaid && o.count > 0 && o.captured >= o.count){
      o.endSaid = true;
      o.active = false;
      const l = o.lines;
      say('f', l.konF);
      setTimeout(() => say('p', l.konP), 4000);
    }
  }
}

/* chip s hláškou — vždy jen JEDEN, s avatarem, drží 12 s */
const AV_F = `<svg class="av" viewBox="0 0 64 64">
  <circle cx="32" cy="32" r="30" fill="#1a1d22" stroke="#f2c40f" stroke-width="3"/>
  <ellipse cx="32" cy="34" rx="15" ry="17" fill="#c9976b"/>
  <path d="M18 39 q14 20 28 0 l-1 11 q-13 11 -26 0 z" fill="#26262a"/>

  <rect x="19" y="26" width="11" height="7" rx="3" fill="#0c0c0e"/>

  <path d="M30 29 h4" stroke="#0c0c0e" stroke-width="2.5"/>
</svg>`;

  <ellipse cx="32" cy="36" rx="14" ry="16" fill="#d8a97e"/>

const chipsBox = document.getElementById('chips');
function say(who, text){

/* ---------------- kamera a UI ---------------- */
const cam = { yaw: 0.6, pitch: 0.10, dist: 15.0, target: [0, 0, 0] };

// posun kamery do strany (pan) — posouvá bod, kolem kterého se otáčí
function panBy(dx, dy){
  const cp = Math.cos(cam.pitch), sp = Math.sin(cam.pitch);
  const cy = Math.cos(cam.yaw),   sy = Math.sin(cam.yaw);
  const fwd = [-cp * sy, -sp, -cp * cy];
  const right = norm3(cross3(fwd, [0, 1, 0]));
  const up = cross3(right, fwd);
  const f = cam.dist * 0.0016;
  cam.target[0] += -right[0] * dx * f + up[0] * dy * f;
  cam.target[1] += -right[1] * dx * f + up[1] * dy * f;
  cam.target[2] += -right[2] * dx * f + up[2] * dy * f;
  const L = Math.hypot(cam.target[0], cam.target[1], cam.target[2]);
  if(L > 30){ const s = 30 / L; cam.target[0] *= s; cam.target[1] *= s; cam.target[2] *= s; }
}

const QUALITY = {
  low:  { steps: 140, scale: 0.5 },
  med:  { steps: 280, scale: 0.75 },
  high: { steps: 460, scale: 1.0 },
};
const isMobile = matchMedia('(pointer: coarse)').matches;
let qualityKey = isMobile ? 'low' : 'med';
$('quality').value = qualityKey;
let quality = QUALITY[qualityKey];
let lastInteract = -10;
let autoDropped = false;

$('quality').addEventListener('change', e => {
  qualityKey = e.target.value; quality = QUALITY[qualityKey];
  autoDropped = true;
  resize();
});
$('throwBtn').addEventListener('click', launchSun);
// horní lišta presetů z babis-data.js (miniatura + jméno)
if(typeof PRESETS !== 'undefined'){
  const bar = $('presetBar');
  PRESETS.forEach(p => {
    const b = document.createElement('button');
    b.className = 'preset';
    const im = document.createElement('img');
    im.src = p.src; im.alt = p.label;
    const sp = document.createElement('span');
    sp.textContent = p.label;
    b.appendChild(im); b.appendChild(sp);
    b.addEventListener('click', () => launchPreset(p));
    bar.appendChild(b);
  });
}
$('imgBtn').addEventListener('click', () => $('imgFile').click());
$('imgFile').addEventListener('change', e => {
  const f = e.target.files && e.target.files[0];
  if(f) launchImageFile(f);
  e.target.value = '';
});
$('resetBtn').addEventListener('click', resetSun);
$('peri').addEventListener('input', e => {
  $('periVal').textContent = parseFloat(e.target.value).toFixed(1) + ' rs';
});

function resize(){
  const dpr = Math.min(window.devicePixelRatio || 1, 2) * quality.scale;
  canvas.width  = Math.round(canvas.clientWidth  * dpr);
  canvas.height = Math.round(canvas.clientHeight * dpr);
  gl.viewport(0, 0, canvas.width, canvas.height);
  layoutUI();
}
// tlačítka, náhled, komenty i nápovědu posadit NAD skutečnou výšku panelu
function layoutUI(){
  const ph = document.getElementById('panel').offsetHeight;
  const base = 14 + ph + 12;
  document.getElementById('actionBtns').style.bottom = base + 'px';
  document.getElementById('sunPreview').style.bottom = base + 'px';
  const bh = document.getElementById('actionBtns').offsetHeight || 30;
  document.getElementById('chips').style.bottom = (base + bh + 10) + 'px';
  document.getElementById('hint').style.bottom = (base + bh + 10) + 'px';
}
window.addEventListener('resize', resize);

/* ovládání */
const pointers = new Map();
let pinchDist = 0;
let lastCentroid = null;
canvas.addEventListener('contextmenu', e => e.preventDefault());
canvas.addEventListener('dblclick', () => { cam.target = [0, 0, 0]; });
canvas.addEventListener('pointerdown', e => {
  canvas.setPointerCapture(e.pointerId);
  pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if(pointers.size === 2){
    const [a, b] = [...pointers.values()];
    pinchDist = Math.hypot(a.x - b.x, a.y - b.y);
    lastCentroid = { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 };
  }
});
canvas.addEventListener('pointermove', e => {
  if(!pointers.has(e.pointerId)) return;
  const prev = pointers.get(e.pointerId);
  const dx = e.clientX - prev.x, dy = e.clientY - prev.y;
  pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  lastInteract = performance.now() / 1000;
  if(pointers.size === 1){
    if((e.buttons & 2) || e.shiftKey){
      panBy(dx, dy);
    } else {
      cam.yaw   -= dx * 0.005;
      cam.pitch += dy * 0.005;
      cam.pitch = Math.max(-1.35, Math.min(1.35, cam.pitch));
    }
  } else if(pointers.size === 2){
    const [a, b] = [...pointers.values()];
    const d = Math.hypot(a.x - b.x, a.y - b.y);
    if(pinchDist > 0) cam.dist *= pinchDist / d;
    cam.dist = Math.max(3.4, Math.min(42, cam.dist));
    pinchDist = d;
    const c2 = { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 };
    if(lastCentroid) panBy(c2.x - lastCentroid.x, c2.y - lastCentroid.y);
    lastCentroid = c2;
  }
});
const release = e => { pointers.delete(e.pointerId); pinchDist = 0; lastCentroid = null; };
canvas.addEventListener('pointerup', release);
canvas.addEventListener('pointercancel', release);
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  lastInteract = performance.now() / 1000;
  cam.dist *= Math.exp(e.deltaY * 0.0012);
  cam.dist = Math.max(3.4, Math.min(42, cam.dist));
}, { passive: false });

/* ---------------- hlavní smyčka ---------------- */
const fpsBox = $('fps');
const sunPreviewBox = $('sunPreview');
const sunSvg = $('sunSvg');
const sunCircle = $('sunCircle');
let frames = 0, fpsTime = 0, lastT = performance.now() / 1000;
const t0 = lastT;

function frame(){
  const now = performance.now() / 1000;
  const dtF = Math.min(now - lastT, 0.1);
  lastT = now;

  frames++; fpsTime += dtF;
  if(fpsTime >= 1.0){
    const fps = frames / fpsTime;
    fpsBox.textContent = Math.round(fps) + ' fps';
    if(!autoDropped && fps < 20 && qualityKey !== 'low'){
      qualityKey = qualityKey === 'high' ? 'med' : 'low';
      quality = QUALITY[qualityKey];
      $('quality').value = qualityKey;
      resize();
      fpsBox.textContent += ' · auto↓';
    }
    frames = 0; fpsTime = 0;
  }

  if($('rot').checked && now - lastInteract > 3) cam.yaw += dtF * 0.045;

  // fyzika všech aktivních těles
  const anyActive = OBJS.some(o => o.active);
  if(anyActive){
    const speed = parseFloat($('speed').value);
    const adv = speed * dtF;
    const nSub = Math.max(1, Math.min(120, Math.round(adv / 0.04)));
    const dtSub = adv / nSub;
    for(let s = 0; s < nSub; s++) physStep(dtSub);
    checkEvents();
    // upload: pozice a žár (velikost/typ se mění jen při hodu)
    gl.bindBuffer(gl.ARRAY_BUFFER, bufPos);
    gl.bufferSubData(gl.ARRAY_BUFFER, 0, pos);
    gl.bindBuffer(gl.ARRAY_BUFFER, bufHeat);
    gl.bufferSubData(gl.ARRAY_BUFFER, 0, heat);
  }

  // kamera (otáčí se kolem posouvatelného bodu cam.target)
  const cp = Math.cos(cam.pitch), sp = Math.sin(cam.pitch);
  const cy = Math.cos(cam.yaw),   sy = Math.sin(cam.yaw);
  const off = [cam.dist * cp * sy, cam.dist * sp, cam.dist * cp * cy];
  const posC = [cam.target[0] + off[0], cam.target[1] + off[1], cam.target[2] + off[2]];
  const fwd = norm3([-off[0], -off[1], -off[2]]);
  const right = norm3(cross3(fwd, [0, 1, 0]));
  const up = cross3(right, fwd);
  const basis = [right[0],right[1],right[2], up[0],up[1],up[2], fwd[0],fwd[1],fwd[2]];
  const tanHF = Math.tan(0.5 * 60 * Math.PI / 180);

  // náhled velikosti (přerušovaný obrys) — dokud je volný slot
  if(OBJS.some(o => !o.active)){
    sunPreviewBox.style.display = 'flex';
    const RpPrev = parseFloat($('psize').value);
    const rpx = Math.max(10, Math.min(90, RpPrev * (canvas.clientHeight * 0.5) / (tanHF * cam.dist)));
    const sz = Math.ceil(rpx * 2 + 6);
    sunSvg.setAttribute('width', sz); sunSvg.setAttribute('height', sz);
    sunCircle.setAttribute('cx', sz / 2); sunCircle.setAttribute('cy', sz / 2);
    sunCircle.setAttribute('r', rpx);
  } else {
    sunPreviewBox.style.display = 'none';
  }

  // 1) lensing pozadí + disk
  gl.useProgram(progQuad);
  gl.bindVertexArray(vaoQuad);
  gl.disable(gl.BLEND);
  gl.uniform2f(UQ.uRes, canvas.width, canvas.height);
  gl.uniform1f(UQ.uTime, now - t0);
  gl.uniform3f(UQ.uCamPos, posC[0], posC[1], posC[2]);
  gl.uniformMatrix3fv(UQ.uCamBasis, false, basis);
  gl.uniform1f(UQ.uTanHalfFov, tanHF);
  gl.uniform1i(UQ.uSteps, quality.steps);
  gl.uniform1f(UQ.uDiskGain, parseFloat($('gain').value));
  gl.uniform1f(UQ.uDiskOn, $('disk').checked ? 1 : 0);
  gl.drawArrays(gl.TRIANGLES, 0, 3);

  // 2) částice těles (aditivně přes scénu)
  gl.useProgram(progPts);
  gl.bindVertexArray(vaoPts);
  gl.enable(gl.BLEND);
  gl.blendFunc(gl.SRC_ALPHA, gl.ONE);
  gl.uniform2f(UP.uRes, canvas.width, canvas.height);
  gl.uniform3f(UP.uCamPos, posC[0], posC[1], posC[2]);
  gl.uniformMatrix3fv(UP.uCamBasis, false, basis);
  gl.uniform1f(UP.uTanHalfFov, tanHF);
  gl.drawArrays(gl.POINTS, 0, N);

  requestAnimationFrame(frame);
}
function cross3(a, b){ return [a[1]*b[2]-a[2]*b[1], a[2]*b[0]-a[0]*b[2], a[0]*b[1]-a[1]*b[0]]; }
function norm3(a){ const l = Math.hypot(a[0], a[1], a[2]); return [a[0]/l, a[1]/l, a[2]/l]; }

resize();
requestAnimationFrame(frame);
setTimeout(() => { document.getElementById('hint').style.opacity = '0'; }, 8000);
</script>
